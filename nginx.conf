events {}

http {
    # default_type apllication/octet-stream;

    # server_tokens off;
    # limit_req_zone $binary_remote_addr zone=req_limit:10m rate=1r/s;
    # limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    proxy_cache_path /tmp/nginx_cache
        levels=1:2
        keys_zone=ecom_cache:10m
        max_size=512m
        inactive=10m
        use_temp_path=off;
    upstream app {
        # server app:8000 weight=1 max_fails=1 fail_timeout=60s;
        server app_dupe:8001 weight=3 max_fails=1 fail_timeout=360s;
    }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/cert.crt;
        ssl_certificate_key /etc/nginx/certs/cert.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # limit_req zone=req_limit burst=20 nodelay;
        # limit_conn conn_limit 20;

        # location /api/(products/categories) {
        #     proxy_pass http://app;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Request-ID $request_id;

        #     proxy_cache ecom_cache;
        #     proxy_cache_valid 200 5m;
        #     proxy_cache_valid 404 1m;
        #     proxy_cache_background_update on;
        #     proxy_cache_lock on;
        #     proxy_cache_key "$scheme$request_method$host$request_uri";

        #     proxy_cache_bypass $http_authorization;
        #     proxy_no_cache $http_authorization;

        #     add_header X-Cache-Status $upstream_cache_status always;
        #     add_header Cache-Control "public, max-age=300" always;
        #     add_header Access-Control-Allow-Origin * always;
        #     add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        #     add_header Access-Control-Allow-Headers "DNT, USer-Agent, X-Requested-With, If-Modified-Since, Content-Type, Cache-Control, Authorization" always;
        # }

        location / {
            proxy_pass http://app;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-CSRFToken $cookie_csrf_token;
            proxy_set_header X-Request-ID $request_id;

            proxy_cache ecom_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            proxy_cache_bypass $http_authorization;
            proxy_no_cache $http_authorization;

            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=300" always;

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT, USer-Agent, X-Requested-With, If-Modified-Since, Content-Type, Cache-Control, Authorization" always;
        }


        location /ws/ {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connectiom "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT, USer-Agent, X-Requested-With, If-Modified-Since, Content-Type, Cache-Control, Authorization" always;
        }

        location /static/ {
            alias /code/static/;
            autoindex on;
            expires 30d;
            add_header Cache-Control "public, immutable";
            types {
                text/css css;
                application/javascript js;
                image/svg+xml svg;
            }
        }
    }
}