name: Pipelines for E-commerce project
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.12'

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install flake8

            - name: Run flake8
              run: flake8 payments --exclude=migrations --max-line-length=120

    test:
        runs-on: ubuntu-latest
        services:
            postgres: 
                image: postgres:latest
                env:
                    PG_NAME: test_db
                    PG_USER: test_user
                    PG_PASSWORD: test_password
                    PG_HOST: postgres
                    PG_PORT: 5432
                ports:
                    - 5432:5432

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.12'
                
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            
            - name: Run migrations
              run: python manage.py migrate
              env:
                DJANGO_SETTINGS_MODULE: e_commerce.settings
                PG_NAME: test_db
                PG_USER: test_user
                PG_PASSWORD: test_password
                PG_HOST: localhost
                PG_PORT: 5432

            - name: Run tests
              run: python manage.py test shop
              env:
                DJANGO_SETTINGS_MODULE: e_commerce.settings
        
    