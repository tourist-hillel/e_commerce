name: Build & Push to Docker Hub

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Brunch to be deployed'
                required: true
                default: 'main'

env:
    BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ecom

jobs:
    deploy-to-dockerhub:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Create .env file
              run: |
                cat > .env << EOF
                DB_TYPE=${{ secrets.DB_TYPE }}
                PG_NAME=${{ secrets.PG_NAME }}
                PG_USER=${{ secrets.PG_USER }}
                PG_PASSWORD=${{ secrets.PG_PASSWORD }}
                PG_HOST=${{ secrets.PG_HOST }}
                PG_PORT=${{ secrets.PG_PORT }}
                CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
                CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
                EOF

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3
            
            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Extract metadata
              id: meta-backend
              uses: docker/metadata-action@v5
              with:
                images: ${{ env.BACKEND_IMAGE }}
                tags: |
                  type=raw,value=latest,enable=${{ github.ref == 'ref/heads/main'}}
                  type=sha,prefix=,suffix=,format=short

            # - name: Build and push Docker image
            #   uses: docker/build-push-action@v6
            #   with:
            #     context: .
            #     push: true
            #     tags: |
            #         ${{ steps.meta-backend.outputs.tags }}
            #         ${{ env.BACKEND_IMAGE }}:latest
            #     labels: ${{ steps.meta-backend.outputs.labels }}
            #     cache-from: type=gha
            #     cache-to: type=gha,mode=max
            #     build-args: |
            #         BUILD_VERSION=${{ github.sha }}

            - name: Build and push
              run: |
                docker compose build --no-cache
                docker tag ${{ steps.meta-backend.outputs.tags }}
                docker tag ${{ env.BACKEND_IMAGE }}:latest
                docker compose push ${{ steps.meta-backend.outputs.tags }}
                docker compose push ${{ env.BACKEND_IMAGE }}:latest
