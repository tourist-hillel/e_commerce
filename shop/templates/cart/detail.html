<div>
    <h2>Ваш кошик</h2>
    {% if not cart.cart %}
        <div>Ваш кошик порожній</div>
    {% else %}
        <div>
            <table>
                <thead>
                    <tr>
                        <th>Товар</th>
                        <th>Ціна</th>
                        <th>Кількість</th>
                        <th>Сума</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart %}
                        <tr>
                            <td>{{ item.product.name }}</td>
                            <td>{{ item.price }}</td>
                            <td>{{ item.quantity }}</td>
                            <td><strong>{{ item.total_price }}</strong></td>
                            <td>
                                <a href="{% url 'cart_remove' item.product.id %}">Видалити</a>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3"><strong>Загальна сума:</strong></td>
                        <td><strong>{{ total_price }}</strong></td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
            <div>
                <a href="{% url 'order_create' %}">Оформити замовлення</a>
            </div>
        </div>
    {% endif %}
</div>
