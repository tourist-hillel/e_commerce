services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "uvicorn e_commerce.asgi:application --reload --host 0.0.0.0 --port 8000"
    # volumes:
    #   - .:/app
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - e_commerce-ntwrk

  app_dupe:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "uvicorn e_commerce.asgi:application --reload --host 0.0.0.0 --port 8001"
    volumes:
      - .:/app
    expose:
      - "8001"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - e_commerce-ntwrk
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${PG_NAME}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    expose:
      - "5432"
    networks:
      - e_commerce-ntwrk
  
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - e_commerce-ntwrk

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A e_commerce beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - e_commerce-ntwrk

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A e_commerce worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - e_commerce-ntwrk

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A e_commerce flower --port=5555
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker
    ports:
     - '5555:5555'
    networks:
      - e_commerce-ntwrk


  kanchi:
    image: getkanchi/kanchi
    container_name: kanchi_ecommerce
    ports:
      - "3000:3000"
      - "8765:8765"
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@${PG_HOST}:${PG_PORT}/${PG_NAME}
    volumes:
      - kanchi-data:/data
    restart: unless-stopped
    depends_on:
      - redis
      - celery_worker
    networks:
      - e_commerce-ntwrk

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs/:/etc/nginx/certs
      - ./static:/code/static
    depends_on:
      - app
      - app_dupe
    networks:
      - e_commerce-ntwrk
  
  openssl:
    image: alpine/openssl
    volumes:
      - ./certs:/certs
    command: >
      req -x509 -nodes -newkey rsa:4096 -keyout /certs/cert.key
      -out /certs/cert.crt -days 365
      -subj "/C=UA/ST=Kharkiv/L=Kharkiv/O=Hillel_Lectures/OU=Lecture/CN=localhost"

  e_commerce_minio:
    image: minio/minio
    container_name: e_commerce_minio
    restart: always
    ports:
      - "9000:9000"
    environment:
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_KEY}
    volumes:
      - ./data:/data
    command: server /data

volumes:
  kanchi-data:
  
networks:
  e_commerce-ntwrk:
    driver: bridge